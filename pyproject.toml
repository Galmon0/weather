[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "W"]
ignore = ["E501"]   # длинные строки (русские комментарии) не валим

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]   # чтобы `pytest` (как в CI) находил пакет weather, а не только `python -m pytest`
